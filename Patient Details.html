<!DOCTYPE html>
<!--NOTE: All data will come from downtime EMR via Google FHIR; data currently hardcoded for display purposes-->

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <meta charset="utf-8" />
        <title>Patient Details</title>
        <link rel="stylesheet" href="site.css" />
        <link rel="stylesheet" href="patient-details.css" />
    </head>
        <body>
            <div id="patient-details-overview">
                <h2>Jane Doe</h2>
                <p>
                    Room 208 <br />
                    Unit 2 <br />
                    <span class="mews-score-circle">6</span> <br />
                    <span class="mews-score-text">Warning</span> <br />
                    Diagnosis: COVID-19
                </p>
            </div>

            <div>
                <table>
                    <thead>
                        <tr>
                            <th>Vitals Description</th>
                            <th>MEWS Score</th>
                            <th>Vitals Statistics</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Systolic BP</td>
                            <td>0</td>
                            <td>160/40</td>
                        </tr>
                        <tr>
                            <td>Heart Rate</td>
                            <td>2</td>
                            <td>20 bpm</td>
                        </tr>
                        <tr>
                            <td>Respiratory Rate</td>
                            <td>2</td>
                            <td>20 bpm</td>
                        </tr>
                        <tr>
                            <td>Temperature</td>
                            <td>2</td>
                            <td>101.1&deg;F</td>
                        </tr>
                        <!--NOTE: This data for this field will come from AVPU-->
                        <tr>
                            <td>Conciousness</td>
                            <td>0</td>
                            <td>Voice</td>
                        </tr>
                        <tr>
                            <td>Urine</td>
                            <td>0</td>
                            <td>20 mL</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        
        </body>
</html>
